name: iOS CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.0.1.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Unit Tests
        run: |
          cd FoodOrderApp
          xcodebuild test \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:FoodOrderAppTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            ONLY_ACTIVE_ARCH="NO" \
            2>&1 | tee unit_test_log.txt
          exit ${PIPESTATUS[0]}

      - name: Run UI Tests
        run: |
          cd FoodOrderApp
          xcodebuild test \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:FoodOrderAppUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            ONLY_ACTIVE_ARCH="NO" \
            2>&1 | tee ui_test_log.txt
          exit ${PIPESTATUS[0]}

      - name: Build for production
        run: |
          cd FoodOrderApp
          xcodebuild build \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            unit_test_log.txt
            ui_test_log.txt