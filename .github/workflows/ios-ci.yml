name: iOS CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -switch /Applications/Xcode_15.0.1.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Run Unit Tests
        run: |
          cd FoodOrderApp
          xcodebuild test \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=16.2' \
            -only-testing:FoodOrderAppTests \
            2>&1 | tee unit_test_log.txt
          exit ${PIPESTATUS[0]}

      - name: Run UI Tests
        run: |
          cd FoodOrderApp
          xcodebuild test \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=16.2' \
            -only-testing:FoodOrderAppUITests \
            2>&1 | tee ui_test_log.txt
          exit ${PIPESTATUS[0]}

      - name: Build for production
        run: |
          cd FoodOrderApp
          xcodebuild build \
            -project FoodOrderApp.xcodeproj \
            -scheme FoodOrderApp \
            -destination 'generic/platform=iOS' \
            -configuration Release

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            unit_test_log.txt
            ui_test_log.txt